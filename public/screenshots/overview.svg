  <rect x="0" y="40" width="900" height="520" fill="#152c26"/>

  <text x="32" y="78" font-size="22" font-weight="700" fill="#c9a227">Обзор</text>
  <text x="32" y="100" font-size="13" fill="#a9bdb5">Неделя 24 · обновлено сегодня</text>

  <!-- stat cards -->
  <g>
    <rect x="32" y="120" width="252" height="96" rx="10" fill="#1c3830" stroke="#2c4a40"/>
    <text x="52" y="150" font-size="12" fill="#a9bdb5">Рейтинг силы</text>
    <text x="52" y="188" font-size="30" font-weight="700" fill="#f2ede1">3 214</text>
  </g>
  <g>
    <rect x="308" y="120" width="252" height="96" rx="10" fill="#1c3830" stroke="#2c4a40"/>
    <text x="328" y="150" font-size="12" fill="#a9bdb5">TSI команды</text>
    <text x="328" y="188" font-size="30" font-weight="700" fill="#f2ede1">198 400</text>
  </g>
  <g>
