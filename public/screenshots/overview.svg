<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Roboto, Arial, sans-serif">
  <rect width="900" height="560" rx="14" fill="#0f211c"/>
  <rect x="0" y="0" width="900" height="40" rx="14" fill="#0f211c"/>
  <circle cx="22" cy="20" r="6" fill="#c0503f"/>
  <circle cx="44" cy="20" r="6" fill="#d9a441"/>
  <circle cx="66" cy="20" r="6" fill="#4caf6f"/>
  <rect x="300" y="9" width="300" height="22" rx="11" fill="#152c26"/>
