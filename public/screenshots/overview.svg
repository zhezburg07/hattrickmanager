    <text x="470" y="290" text-anchor="end">Очки</text>
  </g>
  <line x1="52" y1="298" x2="512" y2="298" stroke="#2c4a40"/>
  <g font-size="13" fill="#f2ede1">
    <text x="52" y="322">1</text><text x="80" y="322">Жетысу</text><text x="470" y="322" text-anchor="end">54</text>
    <rect x="44" y="332" width="476" height="26" fill="#c9a227" opacity="0.14" rx="4"/>
    <text x="52" y="350" font-weight="700">2</text><text x="80" y="350" font-weight="700">Наш клуб</text><text x="470" y="350" text-anchor="end" font-weight="700">49</text>
    <text x="52" y="378">3</text><text x="80" y="378">Кайрат</text><text x="470" y="378" text-anchor="end">47</text>
    <text x="52" y="406">4</text><text x="80" y="406">Тобол</text><text x="470" y="406" text-anchor="end">41</text>
    <text x="52" y="434">5</text><text x="80" y="434">Астана</text><text x="470" y="434" text-anchor="end">38</text>
  </g>

  <!-- fan mood -->
  <rect x="552" y="236" width="316" height="230" rx="10" fill="#1c3830" stroke="#2c4a40"/>
  <text x="572" y="264" font-size="14" font-weight="700" fill="#f2ede1">Настроение болельщиков</text>
  <rect x="572" y="284" width="276" height="16" rx="8" fill="#0f211c"/>
  <rect x="572" y="284" width="210" height="16" rx="8" fill="#4caf6f"/>
  <text x="572" y="322" font-size="12" fill="#a9bdb5">Отлично · посещаемость растёт</text>
  <text x="572" y="360" font-size="12" fill="#a9bdb5">Средняя явка</text>
  <text x="572" y="384" font-size="24" font-weight="700" fill="#f2ede1">18 600</text>
  <text x="572" y="420" font-size="12" fill="#a9bdb5">Доход с матча</text>
  <text x="572" y="444" font-size="24" font-weight="700" fill="#f2ede1">4 120 000 ₸</text>
