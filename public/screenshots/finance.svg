  <g font-size="12" fill="#f2ede1">
    <text x="484" y="264">Зарплаты</text><rect x="652" y="252" width="140" height="14" rx="3" fill="#c0503f"/><text x="812" y="264" text-anchor="end">3 840 000</text>
    <text x="484" y="296">Тренерский штаб</text><rect x="652" y="284" width="60" height="14" rx="3" fill="#c0503f" opacity="0.8"/><text x="812" y="296" text-anchor="end">1 120 000</text>
