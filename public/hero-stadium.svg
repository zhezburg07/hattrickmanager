    <circle cx="1100" cy="352" r="2.5" /><circle cx="1190" cy="360" r="2.5" /><circle cx="1270" cy="368" r="2.5" />
    <circle cx="1340" cy="378" r="2.5" /><circle cx="1400" cy="386" r="2.5" /><circle cx="1440" cy="392" r="2.5" />
